name: Update LOC Count

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch: # Manual trigger
  repository_dispatch:
    types: [loc-update]

jobs:
  count-loc:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v5

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Verify PAT secret is set
        env:
          GH_TOKEN: ${{ secrets.LOC_COUNTER_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::LOC_COUNTER_PAT secret is missing or empty."
            echo "::error::Add a fine-grained PAT (Contents: Read-only on all repos under JadenRazo)"
            echo "::error::at https://github.com/JadenRazo/JadenRazo/settings/secrets/actions/new"
            echo "::error::Secret name MUST be exactly: LOC_COUNTER_PAT"
            exit 1
          fi
          echo "PAT secret is present (length: ${#GH_TOKEN})"

      - name: Clone repos and count LOC
        env:
          GH_TOKEN: ${{ secrets.LOC_COUNTER_PAT }}
        run: |
          set -euo pipefail
          mkdir repos && cd repos

          REPOS=$(gh repo list JadenRazo \
            --limit 500 \
            --no-archived \
            --source \
            --json nameWithOwner,isFork \
            --jq '.[] | select(.isFork == false and .nameWithOwner != "JadenRazo/JadenRazo") | .nameWithOwner')

          if [ -z "$REPOS" ]; then
            echo "::error::No repos returned by gh repo list — check LOC_COUNTER_PAT scopes or rate limit"
            exit 1
          fi
          echo "Will count LOC across $(echo "$REPOS" | wc -l) repos"

          for repo in $REPOS; do
            gh repo clone "$repo" -- --depth 1 --quiet || echo "::warning::clone failed for $repo"
          done

          cd ..
          cloc repos --json --quiet > loc-data.json

      - name: Generate LOC table
        run: |
          python3 << 'SCRIPT'
          import json, re

          with open("loc-data.json") as f:
              data = json.load(f)

          langs = []
          total_code = 0
          total_lines = 0

          for lang, info in data.items():
              if lang in ("header", "SUM"):
                  continue
              code = info.get("code", 0)
              lines = code + info.get("comment", 0) + info.get("blank", 0)
              if code > 0:
                  langs.append((lang, code, lines))
                  total_code += code
                  total_lines += lines

          langs.sort(key=lambda x: x[1], reverse=True)

          def fmt(n):
              return f"{n:,}"

          lines_out = []
          lines_out.append(f"**{fmt(total_code)}** lines of code across **{fmt(total_lines)}** total lines\n")
          lines_out.append("| Language | Lines of Code | % |")
          lines_out.append("|----------|-------------:|--:|")
          for lang, code, _ in langs[:12]:
              pct = round(code / total_code * 100, 1)
              lines_out.append(f"| {lang} | {fmt(code)} | {pct}% |")

          table = "\n".join(lines_out)

          with open("README.md", "r") as f:
              readme = f.read()

          pattern = r"(<!-- LOC_START -->).*?(<!-- LOC_END -->)"
          replacement = f"<!-- LOC_START -->\n{table}\n<!-- LOC_END -->"

          if "<!-- LOC_START -->" in readme:
              readme = re.sub(pattern, replacement, readme, flags=re.DOTALL)
              with open("README.md", "w") as f:
                  f.write(readme)
              print(f"Updated: {fmt(total_code)} lines of code")
          else:
              print("ERROR: LOC markers not found in README.md, skipping update")
              exit(1)
          SCRIPT

      - name: Cleanup
        run: rm -rf repos loc-data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update LOC statistics"
          git pull --rebase origin main
          git push
